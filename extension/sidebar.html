<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Repo Talk Chat</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
                    sans-serif;
                background: #ffffff;
                color: #24292e;
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .sidebar-header {
                padding: 16px;
                border-bottom: 1px solid #e1e4e8;
                background: #f6f8fa;
                flex-shrink: 0;
            }

            .header-title {
                font-size: 14px;
                font-weight: 600;
                color: #24292e;
                margin-bottom: 4px;
            }
            .header-subtitle {
                font-size: 12px;
                color: #666;
            }

            .messages-container {
                flex: 1;
                overflow-y: auto;
                padding: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .message {
                display: flex;
                gap: 8px;
                padding: 8px;
                border-radius: 6px;
                background: #f6f8fa;
                animation: slideIn 0.2s ease-out;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .message-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                flex-shrink: 0;
                background: #0366d6;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 12px;
                font-weight: bold;
            }

            .message-content {
                flex: 1;
                min-width: 0;
            }

            .message-header {
                display: flex;
                align-items: baseline;
                gap: 6px;
                margin-bottom: 4px;
            }
            .message-author {
                font-weight: 600;
                font-size: 12px;
                color: #24292e;
            }
            .message-time {
                font-size: 11px;
                color: #999;
            }
            .message-text {
                font-size: 13px;
                color: #24292e;
                word-wrap: break-word;
                white-space: pre-wrap;
            }

            .status-message {
                text-align: center;
                font-size: 12px;
                color: #666;
                padding: 8px;
                font-style: italic;
            }

            .typing-indicator {
                display: flex;
                gap: 4px;
                align-items: center;
                padding: 8px;
                color: #666;
                font-size: 12px;
            }
            .typing-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #999;
                animation: typing 1.4s infinite;
            }
            .typing-dot:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-dot:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing {
                0%,
                60%,
                100% {
                    opacity: 0.3;
                }
                30% {
                    opacity: 1;
                }
            }

            .input-area {
                padding: 12px;
                border-top: 1px solid #e1e4e8;
                background: #f6f8fa;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .input-group {
                display: flex;
                gap: 8px;
            }

            .input-field {
                flex: 1;
                padding: 8px 12px;
                border: 1px solid #e1e4e8;
                border-radius: 6px;
                font-family: inherit;
                font-size: 13px;
                resize: none;
                max-height: 80px;
                background: white;
                color: #24292e;
            }
            .input-field:focus {
                outline: none;
                border-color: #0366d6;
                box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.1);
            }

            .send-btn {
                padding: 8px 12px;
                background: #28a745;
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                flex-shrink: 0;
                transition: background 0.2s;
            }
            .send-btn:hover:not(:disabled) {
                background: #218838;
            }
            .send-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .error-message {
                background: #ffeef0;
                color: #d73a49;
                padding: 8px 12px;
                border-radius: 6px;
                font-size: 12px;
            }

            .loading-state {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100%;
                color: #666;
            }

            .spinner {
                width: 20px;
                height: 20px;
                border: 2px solid #e1e4e8;
                border-top-color: #0366d6;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                margin-right: 8px;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .online-indicator {
                display: inline-block;
                width: 6px;
                height: 6px;
                background: #28a745;
                border-radius: 50%;
                margin-left: 4px;
            }

            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: #d1d5da;
                border-radius: 3px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #959da5;
            }
        </style>
    </head>
    <body>
        <div class="sidebar-header">
            <div class="header-title" id="room-title">Loading...</div>
            <div class="header-subtitle" id="online-count">0 online</div>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="loading-state">
                <div class="spinner"></div>
                <span>Connecting...</span>
            </div>
        </div>

        <div class="input-area">
            <div id="error-display"></div>
            <div class="input-group">
                <textarea
                    id="message-input"
                    class="input-field"
                    placeholder="Type a message..."
                    rows="1"
                ></textarea>
                <button id="send-btn" class="send-btn" disabled>Send</button>
            </div>
        </div>

        <!-- socket.io-client and Clerk are bundled into sidebar.js by esbuild -->
        <script src="sidebar.js"></script>
    </body>
</html>
